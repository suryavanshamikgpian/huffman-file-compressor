<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Compressor</title>
  <meta name="description" content="Compress or decompress your text files using Huffman coding in three easy steps." />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-white min-h-screen font-sans text-gray-800">

  <div class="max-w-xl mx-auto px-6 py-14">

    <!-- Title -->
    <h1 class="text-center text-2xl font-bold mb-12">
      Compress or Decompress Your File<br />
      <span class="text-lg font-normal text-gray-500">in three easy steps</span>
    </h1>

    <!-- Step 1 -->
    <div class="mb-10">
      <div class="flex items-center gap-3 mb-5">
        <span class="w-8 h-8 rounded-full bg-gray-800 text-white text-sm font-semibold flex items-center justify-center">1</span>
        <h2 class="text-base font-semibold uppercase tracking-wide">Upload Your File</h2>
      </div>

      <div class="border border-gray-200 rounded-lg p-6">
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
          <input type="file" id="file-input" class="text-sm text-gray-600" />
          <button id="btn-submit" class="px-5 py-1.5 bg-gray-800 text-white text-sm font-medium rounded hover:bg-gray-700 cursor-pointer">
            Submit
          </button>
        </div>
        <p class="text-xs text-gray-400 mt-3">(any kind of text file accepted)</p>
        <p id="status-text" class="text-sm mt-2 min-h-[1.25rem] text-gray-500"></p>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="mb-10">
      <div class="flex items-center gap-3 mb-5">
        <span class="w-8 h-8 rounded-full bg-gray-800 text-white text-sm font-semibold flex items-center justify-center">2</span>
        <h2 class="text-base font-semibold uppercase tracking-wide">Select Action</h2>
      </div>

      <div class="border border-gray-200 rounded-lg p-6 flex items-center justify-center gap-5">
        <button id="btn-compress" class="px-6 py-2 border-2 border-gray-800 text-sm font-semibold rounded hover:bg-gray-800 hover:text-white transition-colors cursor-pointer">
          COMPRESS
        </button>
        <span class="text-sm text-gray-400">or</span>
        <button id="btn-decompress" class="px-6 py-2 border-2 border-gray-800 text-sm font-semibold rounded hover:bg-gray-800 hover:text-white transition-colors cursor-pointer">
          DECOMPRESS
        </button>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="mb-12">
      <div class="flex items-center gap-3 mb-5">
        <span class="w-8 h-8 rounded-full bg-gray-800 text-white text-sm font-semibold flex items-center justify-center">3</span>
        <h2 class="text-base font-semibold uppercase tracking-wide">Sit Back & Relax</h2>
      </div>

      <div class="border border-gray-200 rounded-lg p-6 text-center">
        <div class="flex justify-center gap-2">
          <span class="w-3 h-3 rounded-full bg-gray-800 inline-block"></span>
          <span class="w-3 h-3 rounded-full bg-gray-500 inline-block"></span>
          <span class="w-3 h-3 rounded-full bg-gray-300 inline-block"></span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="border-t border-gray-200 pt-6 text-center text-sm text-gray-500 space-y-2">
      <p>
        <button id="btn-restart" class="text-gray-800 font-medium underline underline-offset-2 hover:text-gray-600 cursor-pointer">
          Start Again
        </button>
      </p>
      <p>
        Want to know more about the compression technique?
        <a href="https://en.wikipedia.org/wiki/Huffman_coding" target="_blank" rel="noopener noreferrer" class="text-gray-800 font-medium underline underline-offset-2 hover:text-gray-600">
          Click here
        </a>
      </p>
    </div>

  </div>

  <!-- Warning Modal -->
  <dialog id="warning-modal" class="rounded-lg p-0 border-none shadow-xl max-w-md w-full backdrop:bg-black/50">
    <div class="bg-gray-800 text-gray-300 p-6 rounded-lg">
      <p class="font-semibold text-gray-100 mb-2" id="warning-title"></p>
      <p class="text-sm leading-relaxed mb-1" id="warning-line1"></p>
      <p class="text-sm leading-relaxed mb-1" id="warning-line2"></p>
      <p class="text-sm leading-relaxed" id="warning-line3"></p>
      <div class="flex justify-end mt-5">
        <button id="warning-ok" class="px-6 py-1.5 bg-gray-600 text-white text-sm font-medium rounded hover:bg-gray-500 cursor-pointer border border-gray-500">
          OK
        </button>
      </div>
    </div>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
